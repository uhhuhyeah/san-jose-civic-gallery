services:
  db:
    image: postgres:17
    container_name: san-jose-civic-gallery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: san_jose_civic_gallery_development
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d san_jose_civic_gallery_development"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
