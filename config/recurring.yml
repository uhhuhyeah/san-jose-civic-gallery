# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  check_failed_jobs:
    class: CheckFailedJobsJob
    queue: background
    schedule: every hour
  # Sync recent events from every active Legistar body. Cadence picks up
  # agenda amendments and newly added meetings within hours.
  sync_recent_events_all_bodies:
    class: Ingestion::SyncRecentEventsForAllBodiesJob
    args: [ { limit: 25 } ]
    schedule: every 4 hours

  # Pick up newly-extracted attachments and produce AI summaries for them.
  # BackfillAttachmentSummaries skips attachments that already have a
  # successful summary for the current model + prompt version, so this is
  # safe to run on a recurring basis.
  generate_attachment_summaries:
    class: Generated::BackfillAttachmentSummariesJob
    args: [ { limit: 150, dry_run: false } ]
    schedule: every 2 hours

  # Classify matters into Pulse themes. Runs offset from the summary job so the
  # attachment summaries it uses as source text are likely already generated.
  # BackfillMatterThemes skips matters already classified for the current model
  # + prompt version (and re-tags ones whose source input changed), so this is
  # safe to run on a recurring basis. See docs/pulse.md.
  classify_matter_themes:
    class: Generated::BackfillMatterThemesJob
    args: [ { limit: 150, dry_run: false } ]
    schedule: every 2 hours at minute 30

  # Summarize meetings from their published agenda. BackfillEventSummaries only
  # considers events that have agenda items and skips events already summarized
  # for the current model + prompt version + input hash, re-running only when an
  # event's item set changes, so this is safe on a recurring basis. Offset from
  # the matter jobs so the agenda items it reads are settled.
  summarize_events:
    class: Generated::BackfillEventSummariesJob
    args: [ { limit: 100, dry_run: false } ]
    schedule: every 2 hours at minute 45

  # Generate monthly civic roundups. Runs at 06:00 on the 10th of each month so
  # late document uploads and summaries from the prior month have settled before
  # the recap is written (uploads do not always land on the meeting day).
  # BackfillMonthlyRoundups only targets closed months, gates on civic activity,
  # and freezes a period once it has a succeeded roundup (only force regenerates),
  # so this is safe to run on a recurring basis. See docs/monthly-roundup-plan.md.
  generate_monthly_roundups:
    class: Generated::BackfillMonthlyRoundupsJob
    args: [ { limit: 1, dry_run: false } ]
    schedule: "0 6 10 * *"

  # Discover and re-sync recent SJUSD (Simbli) board meetings. Low cadence and a
  # small limit keep us a polite guest on the vendor platform and avoid
  # re-fetching static older meetings; new and amended meetings sit at the top
  # of the listing. Runs browser-backed on the isolated simbli_ingestion queue,
  # so it never runs parallel browsers or competes with city ingestion. The
  # initial historical backfill is a one-off manual `simbli:sync_meetings` run.
  sync_recent_sjusd_meetings:
    class: Ingestion::Simbli::SyncMeetingsJob
    args: [ { limit: 5 } ]
    schedule: every day at 5:30am
