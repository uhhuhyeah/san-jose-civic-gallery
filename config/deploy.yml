service: san-jose-civic-pulse
image: your-registry-namespace/san-jose-civic-pulse

servers:
  web:
    hosts:
      - YOUR_APP_VPS_IP
  jobs:
    hosts:
      - YOUR_APP_VPS_IP
    cmd: ./bin/jobs

proxy:
  ssl: true
  host: civic-pulse.example.com
  app_port: 80

registry:
  server: ghcr.io
  username: YOUR_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    AWS_REGION: auto
    AWS_BUCKET: your-r2-bucket
    AWS_ENDPOINT_URL_S3: https://YOUR_ACCOUNT_ID.r2.cloudflarestorage.com
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - OPENAI_API_KEY

volumes:
  - "san_jose_civic_pulse_storage:/rails/storage"

asset_path: /rails/public/assets
