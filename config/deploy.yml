service: san-jose-civic-gallery
image: uhhuhyeah/san-jose-civic-gallery

servers:
  web:
    hosts:
      - 31.220.108.29
  jobs:
    hosts:
      - 31.220.108.29
    cmd: ./bin/jobs

proxy:
  ssl: true
  hosts:
    - sanjose.civicgallery.org
    - sjusd.civicgallery.org
  app_port: 80

registry:
  server: ghcr.io
  username: uhhuhyeah
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  # Build on the native-amd64 deploy host so the ghcr.io push happens over the
  # server's datacenter uplink instead of a local connection (which was
  # stalling the blob upload), and to skip QEMU emulation.
  remote: ssh://root@31.220.108.29

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    AWS_REGION: auto
    AWS_BUCKET: civic-gallery-production
    AWS_ENDPOINT_URL_S3: https://942cc91abd309aacae9c081b86bbab34.r2.cloudflarestorage.com
    # Cloudflare R2 rejects the modern S3 checksum headers that aws-sdk-s3 >= 1.218 sends by default.
    AWS_REQUEST_CHECKSUM_CALCULATION: when_required
    AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - GENERATED_SUMMARY_API_KEY
    - SENTRY_DSN
    - MISSION_CONTROL_USERNAME
    - MISSION_CONTROL_PASSWORD

volumes:
  - "san_jose_civic_gallery_storage:/rails/storage"

asset_path: /rails/public/assets
