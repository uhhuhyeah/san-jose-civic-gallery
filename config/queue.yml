default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: [ "default" ]
      threads: 3
      processes: 1
      polling_interval: 0.1
    - queues: [ "solid_queue_recurring" ]
      threads: 1
      processes: 1
      polling_interval: 1
    - queues: [ "slow_extract" ]
      threads: 1
      processes: 1
      polling_interval: 1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
